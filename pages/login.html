<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ComicVerse</title>
    <meta name="description" content="Login to your ComicVerse account to access your dashboard, manage orders, and more.">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="auth-page">
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="/" class="logo">COMICVERSE</a>
                
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/pages/shop.html">Shop</a></li>
                    <li><a href="/pages/blog/index.html">Blog</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>WELCOME BACK</h1>
                    <p>Login to your ComicVerse account</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="your@email.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="/pages/reset-password.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <button onclick="googleLogin()" class="btn btn-google btn-block">
                    <img src="/assets/images/google-icon.svg" alt="Google" class="google-icon">
                    Continue with Google
                </button>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/pages/signup.html">Sign Up</a></p>
                </div>

                <!-- Demo Credentials -->
                <div class="demo-credentials">
                    <p><strong>Demo Credentials:</strong></p>
                    <p>Email: demo@comicverse.com</p>
                    <p>Password: demo123456</p>
                </div>
            </div>

            <!-- Comic Decoration -->
            <div class="auth-decoration">
                <div class="comic-bubble bubble1">POW!</div>
                <div class="comic-bubble bubble2">BAM!</div>
                <div class="comic-bubble bubble3">ZAP!</div>
                <img src="/assets/images/comic-characters.png" alt="Comic Characters" class="auth-image">
            </div>
        </div>
    </main>

    <style>
        .auth-page {
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            min-height: 100vh;
        }

        .auth-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        .auth-card {
            background-color: var(--card-bg);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-hover);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-family: 'Bangers', cursive;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }

        .auth-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background-color: var(--dark-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-block {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .auth-divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background-color: var(--border-color);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-divider span {
            background-color: var(--card-bg);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .btn-google {
            background-color: white;
            color: #333;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-google:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            border: 1px solid var(--primary-color);
            text-align: center;
        }

        .demo-credentials p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .demo-credentials strong {
            color: var(--primary-color);
        }

        .auth-decoration {
            position: relative;
            height: 500px;
        }

        .comic-bubble {
            position: absolute;
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: var(--primary-color);
            text-shadow: 3px 3px 0 var(--secondary-color);
            animation: float 3s ease-in-out infinite;
        }

        .bubble1 {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .bubble2 {
            top: 50%;
            right: 10%;
            animation-delay: 0.5s;
        }

        .bubble3 {
            bottom: 20%;
            left: 30%;
            animation-delay: 1s;
        }

        .auth-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 80%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            
            .auth-decoration {
                display: none;
            }
        }
    </style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
</body>
</html>
