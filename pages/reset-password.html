<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ComicVerse</title>
    <meta name="description" content="Reset your ComicVerse account password.">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="auth-page">
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="/" class="logo">COMICVERSE</a>
                
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/pages/shop.html">Shop</a></li>
                    <li><a href="/pages/blog/index.html">Blog</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="reset-container">
            <div class="reset-card">
                <div class="reset-header">
                    <h1>RESET PASSWORD</h1>
                    <p>Enter your email to receive reset instructions</p>
                </div>

                <form id="resetForm" class="reset-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="your@email.com" required autocomplete="email">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Send Reset Email</button>
                </form>

                <div class="reset-footer">
                    <p><a href="/pages/login.html">← Back to Login</a></p>
                </div>

                <div class="reset-help">
                    <h4>Need Help?</h4>
                    <p>If you're having trouble resetting your password, please <a href="/pages/contact.html">contact support</a>.</p>
                </div>
            </div>

            <!-- Success Message (hidden by default) -->
            <div id="resetSuccess" class="reset-success" style="display: none;">
                <div class="success-icon">✓</div>
                <h2>Email Sent!</h2>
                <p>Check your inbox for password reset instructions.</p>
                <p class="small">Didn't receive the email? <button onclick="resendReset()" class="link-button">Click here to resend</button></p>
            </div>
        </div>
    </main>

    <style>
        .reset-container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .reset-card {
            background-color: var(--card-bg);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-hover);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header h1 {
            font-family: 'Bangers', cursive;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: var(--text-secondary);
        }

        .reset-form .form-group {
            margin-bottom: 1.5rem;
        }

        .reset-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .reset-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .reset-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .reset-footer a:hover {
            color: var(--primary-color);
        }

        .reset-help {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }

        .reset-help h4 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .reset-help p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .reset-help a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .reset-help a:hover {
            text-decoration: underline;
        }

        .reset-success {
            text-align: center;
            background-color: var(--card-bg);
            border: 3px solid var(--success);
            border-radius: 20px;
            padding: 2.5rem;
            margin-top: 2rem;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 1.5rem;
        }

        .reset-success h2 {
            color: var(--success);
            margin-bottom: 1rem;
        }

        .reset-success p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .reset-success .small {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .link-button {
            background: none;
            border: none;
            color: var(--primary-color);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .link-button:hover {
            color: var(--secondary-color);
        }
    </style>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function resendReset() {
            const email = document.getElementById('email').value;
            if (email) {
                resetPassword(email);
            }
        }
    </script>
</body>
</html>
