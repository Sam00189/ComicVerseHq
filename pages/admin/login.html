<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - ComicVerse</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">

<!-- Firebase (CORRECT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body class="admin-login-page">

<div class="admin-login-container">
    <div class="admin-login-card">

        <div class="admin-login-header">
            <a href="/" class="admin-logo">COMICVERSE <span>Admin</span></a>
            <p>Sign in to access the admin panel</p>
        </div>

        <form id="adminLoginForm" class="admin-login-form">

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login to Admin
            </button>

        </form>

        <div class="admin-login-footer">
            <a href="/pages/login.html">← Back to User Login</a>
        </div>

    </div>
</div>

<!-- Firebase Config -->
<script src="/js/firebase-config.js"></script>
<script src="/js/auth.js"></script>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.textContent = "Logging in...";

    const result = await login(email, password);

    if (result.success) {

        const admin = await isAdmin(result.user.uid);

        if (admin) {
            alert("Admin login successful ✅");
            window.location.href = "/pages/admin/dashboard.html";
        } else {
            alert("❌ You are not admin");
            await logout();
            btn.disabled = false;
            btn.textContent = "Login to Admin";
        }

    } else {
        alert(result.error);
        btn.disabled = false;
        btn.textContent = "Login to Admin";
    }
});
</script>

</body>
</html>
