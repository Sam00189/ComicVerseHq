<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ComicVerse</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="admin-login-page">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <a href="/" class="admin-logo">COMICVERSE <span>Admin</span></a>
                <p>Sign in to access the admin panel</p>
            </div>

            <form id="adminLoginForm" class="admin-login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" 
                           placeholder="admin@comicverse.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" 
                           placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login to Admin</button>
            </form>

            <div class="admin-login-footer">
                <a href="/pages/login.html">← Back to User Login</a>
            </div>

            <div class="admin-login-notice">
                <p><strong>Demo Admin Credentials:</strong></p>
                <p>Email: admin@comicverse.com</p>
                <p>Password: admin123456</p>
                <p class="notice-small">Note: This is a demo. Create an admin user in Firestore first.</p>
            </div>
        </div>
    </div>

    <style>
        .admin-login-page {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .admin-login-card {
            background-color: var(--card-bg);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-hover);
        }

        .admin-login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-logo {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            color: var(--primary-color);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0 var(--secondary-color);
        }

        .admin-logo span {
            font-size: 1rem;
            color: var(--text-secondary);
            display: block;
            font-family: 'Roboto', sans-serif;
            text-shadow: none;
        }

        .admin-login-header p {
            color: var(--text-secondary);
        }

        .admin-login-form .form-group {
            margin-bottom: 1.5rem;
        }

        .admin-login-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .admin-login-form .form-input {
            width: 100%;
            padding: 1rem;
            background-color: var(--dark-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .admin-login-form .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-block {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .admin-login-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .admin-login-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .admin-login-footer a:hover {
            color: var(--primary-color);
        }

        .admin-login-notice {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
        }

        .admin-login-notice p {
            color: var(--text-secondary);
            margin: 0.25rem 0;
        }

        .admin-login-notice strong {
            color: var(--primary-color);
        }

        .notice-small {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
    </style>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const result = await login(email, password);

                if (result.success) {
                    // Check if user is admin
                    const admin = await isAdmin(result.user.uid);
                    
                    if (admin) {
                        showNotification('Admin login successful!', 'success');
                        window.location.href = '/pages/admin/dashboard.html';
                    } else {
                        showNotification('Access denied. Admin privileges required.', 'error');
                        await logout();
                    }
                } else {
                    showNotification(result.error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login to Admin';
                }
            } catch (error) {
                showNotification('Login failed', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login to Admin';
            }
        });
    </script>
</body>
</html>
